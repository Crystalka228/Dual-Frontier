- id: REQ-V0-C-1-WIN32_INPUT_DISPATCH
  title: Win32 message dispatch (WM_KEYDOWN/UP/MOUSEMOVE/L|R|MBUTTONDOWN/UP/MOUSEWHEEL/SETFOCUS/KILLFOCUS → InputEventQueue)
  source_document: DOC-D-V0_C_1
  source_section: S-LOCK-10; V0.C.1 brief Commit 14
  requirement_text: >
    Window.cs WindowProcedure extended с keyboard/mouse/focus dispatch:

    (a) WM_KEYDOWN/WM_SYSKEYDOWN → VirtualKeyMapper.Map(vk) → KeyPressedEvent (if not Unknown).

    (b) WM_KEYUP/WM_SYSKEYUP → KeyReleasedEvent.

    (c) WM_MOUSEMOVE → MouseMovedEvent с signed cursor coordinates from lParam (cast через
        short к preserve sign).
    (d) WM_L|R|MBUTTONDOWN/UP → MouseButtonEvent с (MouseButton, Pressed=true|false).

    (e) WM_MOUSEWHEEL → MouseWheelEvent с normalized delta (rawDelta / WHEEL_DELTA=120).

    (f) WM_SETFOCUS → WindowFocusEvent(true); WM_KILLFOCUS → WindowFocusEvent(false).

    Win32Constants.cs extended с WM_SYSKEYDOWN/UP, WM_RBUTTONDOWN/UP, WM_MBUTTONDOWN/UP,

    WM_MOUSEWHEEL, VK_BACK/TAB/RETURN/SHIFT/CONTROL/MENU/ESCAPE/SPACE/PRIOR/NEXT/END/HOME/

    LEFT/UP/RIGHT/DOWN/DELETE/F1-F12, WHEEL_DELTA.
