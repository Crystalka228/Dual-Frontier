- id: REQ-K-L13
  title: On-demand system activation — 5 wake types
  source_document: DOC-A-KERNEL
  source_section: Part 0, K-L13 (K10.1 AUTHORED)
  requirement_text: >
    Kernel scheduler activates systems on-demand based on wake-up registration, not by

    global tick clock. Five wake-up types supported: Timer (periodic by [TickRate]), Event

    (bus publication subscription), StateChange (component value condition crossing), Init

    (one-shot at startup), Explicit (API-driven wake by another system). Systems not

    satisfying any wake condition for current tick remain blocked; only runnable systems

    enter phase dispatch. Per-tick dependency graph computed on runnable subset.
  verified_by:
