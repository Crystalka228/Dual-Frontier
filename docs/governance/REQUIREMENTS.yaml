- id: REQ-V0-A-VALIDATION_LAYER
  title: Vulkan validation layer ALWAYS-ON в DEBUG + ValidationLog ring buffer (V0.A)
  source_document: DOC-A-VULKAN_SUBSTRATE
  source_section: §11 methodology adjustments — validation layer output check; V0.A brief §1.4 S-LOCK-4
  requirement_text: >
    Vulkan validation layer (VK_LAYER_KHRONOS_validation) ALWAYS-ON в DEBUG builds per

    S-LOCK-4. Debug messenger created via vkCreateDebugUtilsMessengerEXT (extension

    function loaded via vkGetInstanceProcAddr — не direct vulkan-1.dll export). Severity

    filter excludes VERBOSE + INFO (noise reduction); only WARNING + ERROR captured.

    Validation messages stored в thread-safe ring buffer (1024 message capacity, FIFO

    eviction on overflow; per-severity counters preserve total recorded count даже после

    buffer overflow). Per-message severity converted from VkDebugUtilsMessageSeverityFlagsEXT

    к managed ValidationSeverity enum. Debug callback uses [UnmanagedCallersOnly] static

    method с CallConvCdecl (canonical .NET 5+ pattern); cannot capture instance fields,

    so uses static _staticLog (single-instance design — multi-instance would race, V0.A

    scope не exercises). Callback swallows managed exceptions — must не propagate across

    native boundary. Returns VK_FALSE (0) к let Vulkan continue triggering call.

    vkCreateDebugUtilsMessengerCreateInfoEXT chained к VkInstanceCreateInfo.pNext deferred

    к V0.B alongside more robust messenger setup; V0.A uses simpler post-instance creation

    pattern.
