      Tier 3 systems write, with a 7-commit gap between them. After 100 sim ticks, the
      worlds diverge. The dual-write bridge was load-bearing costyl, not transition
      scaffolding.
    affected_documents:
      - DOC-D-K8_34_COMBINED
      - DOC-D-K8_34_COMBINED_V2
      - DOC-B-METHODOLOGY
    root_cause: |
      Brief v1.0 authored the Phase 4+5 *shape* (12 incremental commits) from the
      architecture-doc principle «atomic commit as compilable unit» (METHODOLOGY K-Lesson)
      without simulating each of the 11 intermediate per-commit states. The simulation
      would have surfaced that storage backend is a *binary* property of a component
      type, not divisible into N steps with valid intermediate states. The compilable-unit
      lesson was correctly applied to commit *boundaries* but incorrectly extended to
      cutover *atomicity*.
    immediate_action: |
      Halt v1.0 Phase 4 at session 2026-05-14 (3rd halt of the milestone). Author
      HALT_REPORT_PHASE_4.md (preserved across the v2.0 revert). v2.0 brief re-designed
      Phase 4+5 as a single atomic cutover (§1.4 «storage backend is binary» + §6.4
      «no dual-write phase»). v1.0's 24-commit plan replaced by v2.0's 4-commit plan.
    corrective_action: |
      (1) v2.0 brief authored with explicit «one-atom» Phase 4+5 design — Commit 2 does
          not compile until the entire cutover is complete; no incremental commits.
      (2) METHODOLOGY Lesson #8 («A brief that splits a change into N steps must prove
          each of the N-1 intermediate states is valid») added at v2.0 closure (this
          commit batch). Falsifiable claim: briefs authored under this lesson will not
          incur mid-transition-drift halts.
      (3) v2.0 brief §3 reverts the v1.0 deviation cleanly to b903b91 before Commit 2
          starts — no carry-over of the broken dual-write bridge.
    effectiveness_verification:
      method: "v2.0 atomic cutover (Commit 2) lands without any per-system divergence; tests green at completion"
      date_verified: "2026-05-14"
      verification_commit: "54c6658"
      verification_outcome: "Commit 2 (one atom, 81 files) landed with build clean and 620 tests green. No mid-transition state existed because there was no mid-transition. Corrective action demonstrably effective."
