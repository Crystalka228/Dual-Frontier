  - id: REQ-K-L16
    title: "Simulation tick pipeline depth (D=2 default; configurable 1-3)"
    source_document: DOC-A-KERNEL
    source_section: "Part 0, K-L16 (К10.3 v2 load-bearing 2026-05-20)"
    requirement_text: |
      Simulation tick pipeline depth D ≥ 1 (configurable 1-3, default 2). Simulation
      thread runs D ticks ahead of display thread для pipeline-managed dispatches.
      Cross-layer async operations (GPU compute pipeline-managed, network, disk I/O)
      have full pipeline-depth window к complete без blocking simulation thread.
      Display thread reads results от simulation tick (CurrentSimTick - D). Pipeline
      drain orderly at save/pause; pipeline refill orderly at load/resume. К-L16
      establishes display latency invariant (D × tick_period); К-L15 fast tier latency
      invariant (subscriber response ≤1ms) preserved independently.

      S-LOCK-13 coexistence: governs pipeline-managed dispatches; V1's K-L7 sync
      dispatch_compute_field path orthogonal и preserved для existing consumers per
      K-L9 «Vanilla = mods» author choice per field.

      Save protocol per S8-Q1.5: snapshot display tick state (CurrentSimTick - D).
      Display already sees coherent world; pipeline drain не required at save time.
      Faster save (no waiting для in-flight compute completion).

      Pause protocol: natural convergence — sim thread completes current tick, no
      new dispatch. Pipeline depth naturally absorbs already-dispatched work. К-L18
      quiescent state precondition (Item 41, subsequent load-bearing commit) verifies
      pipeline quiesced before mod operations.
