  - id: REQ-K-L7_1
    title: "GPU compute pipeline slot binding (sub-invariant к K-L7; opt-in coexistence)"
    source_document: DOC-A-KERNEL
    source_section: "Part 0, K-L7 (+К-L7.1 К10.3 v2 load-bearing 2026-05-20)"
    requirement_text: |
      GPU compute writes к RawTileField storage are bound к pipeline slot (К-L16).
      Sim-thread reads of compute-managed fields see slot-tail state — sim tick T+D
      reads dispatched-at-(T+D-1) state. One-tick lag from sim-perspective bounded
      и deterministic. К-L7 atomic-from-observer invariant preserved within pipeline
