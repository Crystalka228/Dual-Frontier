  - id: CAPA-2026-05-21-A_PRIME_7_X-BUS-COALESCE-ONSQUARED
    opened_date: "2026-05-21"
    closure_status: CLOSED
    closed_date: "2026-05-21"
    closed_commit: "faa4c73"
    closure_outcome: "O(N²) nested-iterator coalesce_pending_locked rewritten к O(N) single-pass hash-index в β5; native selftest preserves ALL PASSED."
    trigger: |
      Crystalka BUS_DESIGN_INVESTIGATION 2026-05-21 §«Источник проблемы #3» (Bug #3).
      coalesce_pending_locked в background_queue.cpp:42-64 used a nested begin()/erase()
      iteration: for each event, scanned ALL prior events looking for (type_id,
      coalesce_key) duplicates. Complexity O(N²); empirically ~16 ms at N=1000 but
      effectively infinite at N=5_000_000 (S3 stress probe hung native thread for
      multiple minutes; CPU=0, killed via process kill).
    affected_documents:
      - DOC-A-KERNEL
    root_cause: |
      Algorithm choice during K10.2 implementation favored simplicity (nested loop
      mirrors the conceptual description «look back for prior with same key») без
      performance analysis at extreme N. K10.2 stress coverage was 1000-event ceiling;
      no test exercised the 10k+ regime where O(N²) starts to bite.
    immediate_action: |
      Surface через А'.7.x investigation S3 probe + β5 algorithm rewrite.
    corrective_action: |
      Hash-index single-pass algorithm: compact 64-bit key = (type_id << 32) | coalesce_key.
      std::unordered_map<uint64_t, size_t> first_index tracks the first occurrence index
      в a result vector. Duplicates merge into first via registry-resolved coalesce_fn;
      no-coalesce-fn fallback preserves the latest event as new first-occurrence
      (latest-wins semantics for empty/missing-fn cases). Single pass, amortised O(1)
      per event = O(N) total. Empirically: 1000 events / ~14 ms (linear); 5M events
      extrapolates к ~70 seconds (vs effectively infinite pre-fix).
    preventive_action: |
      Lesson candidate already covered by existing Lesson #N (stress-test scale beyond
      production ceiling surfaces algorithmic ceilings cheaply).
    effectiveness_verification:
      method: "df_native_selftest ALL PASSED post-faa4c73; investigation S8/S9 probes verify coalesce semantics preserved (1000 events / key=0 = 1 dispatch; 1000 events / keys 1..1000 = 1000 dispatches)."
      date_verified: "2026-05-21"
      verification_commit: "faa4c73"
      verification_outcome: "Native selftest 33 scenarios ALL PASSED. Behavior preserved; complexity flipped."
    lessons_learned_reference: DOC-D-A_PRIME_7_X_BUS_ARCHITECTURE_AMENDMENT

