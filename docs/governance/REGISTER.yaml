  - id: REQ-K-L15_1
    title: "Three-tier independence (К-L15.1 sub-invariant, 2-layer formulation)"
    source_document: DOC-A-KERNEL
    source_section: "Part 0, K-L15 (+К-L15.1) row + Part 0 status footnote (v2.4 amendment, А'.7.x К-extensions cascade #0)"
    requirement_text: |
      Каждый bus tier (Fast / Normal / Background) maintains architectural isolation
      at two structural layers:

      STATE LAYER. Each tier owns its own state struct (FastTierState, NormalTierState,
      BackgroundTierState — bus_native_internal.h) with separate std::mutex, separate
      next_seq counter, separate subscriber map (std::unordered_map<uint32_t,
      std::vector<SubscriberRecord>>), and where applicable separate pending queue.
      No shared mutable state between tiers. Types co-located в shared internal header
      для accessor visibility к cross-tier consumers (mod_unload.cpp per-mod
      unsubscribe + background_queue.cpp policy layer); shared header does NOT
      introduce shared state, only shared type visibility.

      RUNTIME LAYER. Tier subscription ID space uses high 8 bits = tier identifier +
      low 56 bits = per-tier sequential counter. Cross-tier collisions structurally
      impossible — tier-bit disambiguates. `df_bus_unsubscribe` single-ID API reads
      tier-bit and dispatches к per-tier unsubscribe path. `df_bus_clear` acquires
      three tier mutexes в fixed fast→normal→background order для deadlock safety,
      clears each tier state. Cross-tier publish semantics: Fast tier subscriber
      callback MAY publish events к any tier (re-entrant safe through mutex
      isolation — Fast publish acquires only fast mutex; Normal/Background publish
      from Fast callback acquires only the destination tier mutex). Cross-tier re-
      entrancy was structural deadlock hazard pre-А'.7.x (single shared mutex
      prevented re-entrant publish); post-А'.7.x re-entrancy is safe и tested (S10
      cross-tier re-entrancy probe at SchedulerExtremeTests.cs:1007).

      K-L15 parent invariants preserved: single DLL (К-L2 unchanged), single C ABI
      surface (bus_native.h 16 functions unchanged), native bus authority, three-
      tier dispatch semantics (Fast synchronous / Normal batched / Background
      coalesced idle-slot). К-L15.1 strengthens К-L15 by making tier independence
      explicit at behavioral level (state isolation + runtime isolation + cross-
      tier re-entrancy safety).

      Falsifiability: К-L15.1 falsified if a subsequent cascade demonstrates tier
      dependence at state level (e.g., shared mutex between tiers reintroduced),
      tier dependence at runtime level (e.g., shared subscription ID counter, tier-
      bit disambiguation broken), or cross-tier re-entrancy deadlock (S10 probe
      regresses). Each falsification mode is observable behavioral condition,
      recordable в cascade closure metrics. Compile-time isolation via per-tier
      source files was considered as а 3rd layer at brief-authoring time, но
      rejected per gap audit G-2 Option B 2026-05-21 — К-L invariants describe
      load-bearing behavior, not aspirational code organization. The investigation
      empirically verified state + runtime isolation; compile-time isolation lives
      в А'.7.5 sub-milestone as engineering-aesthetic follow-up без К-L impact.

      Sub-invariant LOCK semantics: К-L15.1 LOCKS at А'.7.x closure while К-L15
      (parent) stays AUTHORED candidate until A'.8 closure (mirrors К-L7.1 precedent).
      If К-L15 is modified или superseded at A'.8 closure, К-L15.1 inherits the
      scope change; sub-invariant text is conditionally bound к parent invariant
      semantics.
    verified_by:
      - test: "tests/DualFrontier.Core.Tests/Scheduling/SchedulerExtremeTests.S10_Bus_CrossTier_FastCallback_PublishesNormal_NoDeadlock"
        test_method: "S10 cross-tier re-entrancy probe — Fast subscriber callback publishes Normal event; must not deadlock and must complete ≤100 ms (was deadlock-prone pre-А'.7.x single mutex split)."
        verification_type: behavioral
      - file: native/DualFrontier.Core.Native/test/selftest.cpp
        test_method: "bus scenarios — fast publish/subscribe roundtrip, normal batched drain, background coalesce, per-mod bulk unsubscribe, save-integrated round-trip; post per-tier split all 33 scenarios ALL PASSED."
        verification_type: native_test
      - test: "tests/DualFrontier.Core.Benchmarks/Stress/SchedulerStressBenchmarks"
        test_method: "S3 throughput probe pre vs post bus refactor — +45% empirical at 16 producers × 3 tiers / 5M events."
        verification_type: empirical_evidence
      - file: native/DualFrontier.Core.Native/src/bus_native_internal.h
        test_method: "state isolation inspection — 3 separate TierState structs (FastTierState/NormalTierState/BackgroundTierState) each с own mutex + next_seq + subscribers + pending where applicable; BusNative::fast()/normal()/background() accessors replace prior BusNative::instance() singleton."
        verification_type: code_inspection
      - file: native/DualFrontier.Core.Native/src/bus_native.cpp
        test_method: "runtime isolation inspection — encode_id() uses (TierTag << 56) | (seq & ID_MASK); df_bus_unsubscribe dispatches by decode_tier(); df_bus_clear acquires lf/ln/lb in fixed fast→normal→background order; per-tier publish/subscribe acquires only the tier mutex."
        verification_type: code_inspection
      - file: native/DualFrontier.Core.Native/src/background_queue.cpp
        test_method: "cross-tier consumer inspection — background_queue.cpp uses BusNative::background() directly (not BusNative::instance()), acquires only tier.mutex; df_background_queue_dispatch_idle_slot drains via Background tier accessor."
        verification_type: code_inspection
      - file: native/DualFrontier.Core.Native/src/mod_unload.cpp
        test_method: "cross-tier consumer inspection — mod_unload calls df_bus_unsubscribe_*_by_mod public C ABI (each acquires only relevant tier mutex); BusNative::background() direct access for diagnostic event-preserved count; no shared bus mutex critical section across tiers anywhere."
        verification_type: code_inspection
    verification_status: VERIFIED
    verification_date: "2026-05-21"
    verification_milestone: "А'.7.x К-extensions cascade #0 closure (К-L15.1 sub-invariant LOCKED at γ4 LOAD-BEARING commit 08d0bba; falsifiability committed in canonical text)"

  - id: REQ-K-L19
    title: "Hardware tier commitment (Vulkan 1.3 + async compute queue family mandate)"
    source_document: DOC-A-KERNEL
    source_section: "Part 0, K-L19 (V0.B LOCKED 2026-05-18 — implementation backing operational at landing)"
    requirement_text: |
      Dual Frontier requires Vulkan 1.3 hardware с async compute queue family support.
      Target hardware tier: NVIDIA Turing+ (GeForce GTX 1660 / RTX 20-series и newer),
      AMD RDNA 1+ (Radeon RX 5500 и newer), Intel Arc Alchemist+ (Arc A380 и newer).
      Async compute queue family used для compute-side pipeline depth dispatches
      (К-L16 reserved для К10.3 elaboration); graphics queue for display rendering;
      copy/transfer queue for asset transfers. Kernel mandates queue family availability
      at startup; failure to detect async compute queue family is fail-fast condition
      с user-facing diagnostic message pointing к README hardware requirements section.
      Hardware exclusion of pre-Turing NVIDIA, pre-RDNA AMD, pre-Arc Intel, и most
      integrated GPUs accepted as architectural choice supporting clean implementation
      per K-L14 («performance derives from architectural cleanliness»); not a hardware-
      discrimination decision. By Dual Frontier release timeline, target hardware tier
      represents majority of gaming hardware.
