  - id: REQ-K-L17
    title: "Display composition multi-layer (К-L17, К10.3 v2 load-bearing 2/3)"
    source_document: DOC-A-KERNEL
    source_section: "Part 0, K-L17 (К10.3 v2 load-bearing 2026-05-20)"
