    closure_outcome: "A'.5 K8.3+K8.4 combined v2.0 closed cleanly with the storage cutover atom — the original K8.3 premise (component storage already in NativeWorld) was inverted into the v2.0 design (component storage moves to NativeWorld in this milestone, atomically). v2.0 brief authored from a fresh deep-read of GameBootstrap/factories/SystemBase/SystemExecutionContext per Lesson candidate from this CAPA's HALT_REPORT.md §7; that lesson formalized as Lesson #7 (transcribe the API, not paraphrase) at v2.0 closure. Effectiveness evidence: zero further premise misses across the 4-commit execution arc (24e5f56..PENDING-COMMIT-4)."
    trigger: |
      K8.3 v2.0 brief authoring (2026-05-13, Opus deliberation, commit f7e6d52)
      presupposed component storage already in NativeWorld at K8.3 execution time
      («post-K8.2 v2 closure, all production components are unmanaged structs (Path α)»
      framing in brief §1). Claude Code execution attempt same day surfaced premise
      defect at Phase 0.2: GameBootstrap.cs:85-90 inline comment explicitly states
      «component storage stays on the managed World through K8.3; the registry-based
      path lights up at K8.4 when component storage moves.» Brief authoring conflated
      K-L3 «struct shape» (achieved K8.2 v2 2026-05-09) with K-L8/K-L11 «native
      storage» (scheduled K8.4 per MIGRATION_PLAN §1.3).
    affected_documents:
      - DOC-D-K8_3
      - DOC-D-K8_3_BRIEF_REFRESH_PATCH
      - DOC-E-A_PRIME_5_K8_3_HALT_INVESTIGATION
      - DOC-A-MIGRATION_PLAN
      - DOC-A-KERNEL
      - DOC-A-PHASE_A_PRIME_SEQUENCING
    root_cause: |
      Brief authoring read GameBootstrap.cs primarily for Q-K8.3-1 coreSystems
      verification (12-system count + names). Comment block at lines 85-90 about
      storage path activation was not surfaced during scope verification. Brief
      authoring relied on architecture-document target-state wording
      (MIGRATION_PLAN §1.2 K8.3 row, KERNEL_ARCHITECTURE Part 0 K-L3 implication
      «default storage path is unmanaged struct») without empirical verification
      against current production wiring. Architecture docs describe target state;
      production wiring describes current state — divergence silent until execution
      attempt. RISK-008 (amendment plan completeness gap) reproduction.
