  - id: REQ-V0-A-WIN32_WINDOW
    title: "Win32 window lifecycle + message pump (V0.A foundation)"
    source_document: DOC-A-VULKAN_SUBSTRATE
    source_section: "§1.1 V0 rendering side deliverables — Win32 window + surface; §2.2 Window module; §2.5 Win32 P/Invoke template"
    requirement_text: |
      Win32 window lifecycle implemented via pure P/Invoke к user32.dll + kernel32.dll
      (no third-party binding per L3). Window can open, show, hide, destroy cleanly.
      Message pump (PeekMessage/TranslateMessage/DispatchMessage loop) drains the OS
      message queue without blocking. WM_CLOSE handler triggers DestroyWindow → WM_DESTROY
      handler calls PostQuitMessage which sets IsOpen=false. Window class registration
      uses unique GUID-suffixed name to prevent multi-instance collision. WindowProc
      delegate pinned via GCHandle.Alloc to prevent GC collection of the function pointer
      thunk during native lifetime. Surface creation hooks (vkCreateWin32SurfaceKHR) deferred
      к V0.B alongside swapchain.
