  governance_impact: >
    Foundational governance artifact codifying PA-001..PA-004 axioms that drive

    project scope, priority, and trade-off decisions across all cascades.


    Axiom inventory:


    PA-001 — AI-agent-first consumer profile (PERMANENT):

    The primary and permanent consumer profile для DualFrontier artifacts is

    AI agents operating in session-mode pipelines, not human developers. Human

    review essential at decision points (Crystalka deliberation, ratification

    gates) but bulk consumer is the AI agent. Audience evolution (community

    emergence / commercial product / multi-developer team) is NOT roadmap

    reality. Anchors: FRAMEWORK §0 + SYNTHESIS_RATIONALE §0 Q-A07-6

    inheritance (LOCKED 2026-05-10). Q-L-15 code-fix providers PERMANENTLY

    dropped + Q-L-13 PublicApiAnalyzers audience-driven deferred reference

    PA-001 as anchor.


    PA-002 — Без костылей (no shortcuts):

    Architectural complexity acceptable when serving correctness /

    falsifiability / long-horizon maintainability. Shortcuts producing «works

    for now» / «we'll fix later» artifacts are forbidden — they accumulate

    as kostyl debt corrupting K-L14 architectural integrity. Anchors:

    Crystalka direction 2026-05-24 verbatim («Ни каких костылей, сложность

    архитектуры всегда оправдана»); amendments log §3.2 honest scoping

    rationale; Lesson #N12 sub-pattern A + B (defensive throws + silent stubs

    ARE acceptable when marked, the kostyl is the *unmarked* shortcut). Q-L-9

    DFK010 dropped (methodology-layer outside Roslyn scope) + Q-L-11 DFC001

    deferred (Mod-API-coupled moving target) + Q-L-13 (community absent)

    reference PA-002.


    PA-003 — Сложность архитектуры всегда оправдана (long-horizon over efficiency):

    When trading architectural simplicity vs soundness, DualFrontier chooses

    soundness. Optimization target: decade-horizon maintainability per solo-

