    no such constructor existed. Brief invented a helper that already existed; gave a

    wrong sln path; the factory bulk-write shape was incompatible with the real K8.1-

    primitive structure (NativeMap/NativeSet/NativeComposite per-instance ids). Caught

    at execution time by Cloud Code reading the kernel files. Five total findings.
