- id: CAPA-2026-05-21-A_PRIME_7_X-BUS-COALESCE-KEY-LOST
  opened_date: 2026-05-21
  closure_status: CLOSED
  closed_date: 2026-05-21
  closed_commit: c1d06f2
  closure_outcome: BusFacade.Publish<T>(T, uint coalesceKey) overload landed at А'.7.x γ1 with runtime tier validation (throws InvalidOperationException if non-Background) + 4 unit tests in ManagedBusBridgeTests.
  trigger: >
    Crystalka BUS_DESIGN_INVESTIGATION 2026-05-21 §«Источник проблемы #1» (Bug #1).

    BusFacade.Publish<T>(T evt) routes к ManagedBusBridge.PublishViaNative which

    has `uint coalesceKey = 0` default parameter. BusFacade never threads coalesce

    key through, так что every Background event of the same type_id structurally

    collapses к one dispatch via the key=0 coalesce path. The native registry rejects

    Background-tier registration без coalesce_fn, but the facade itself silently

    drops semantic distinction.
  affected_documents:
  - DOC-A-KERNEL
  - DOC-D-A_PRIME_7_X_BUS_ARCHITECTURE_AMENDMENT
  root_cause: >
    Managed bus facade API surface incomplete — coalesce_key existed на native ABI

    (`df_bus_publish_background(uint32_t type_id, const void* payload, uint32_t

    payload_size, uint32_t coalesce_key)`) и on the bridge boundary

    (PublishViaNative с `coalesceKey = 0` default), но not at the facade layer where

    mod authors call Publish<T>. K10.2 cascade landed the facade без the Background-

    tier-specific overload; Q-N-34 coalesce semantics required но never reachable

    from production callers.
  immediate_action: >
    Surface defect через А'.7.x cascade Phase 0 read + γ1 fix.
  corrective_action: >
    Add `BusFacade.Publish<T>(T evt, uint coalesceKey) where T : unmanaged, IEvent`

    overload (Q-N-7X-6 LOCKED Option A — overload, not interface convention). Runtime

    tier validation throws InvalidOperationException for non-Background tier events

    caught at the managed boundary (Fast/Normal tiers don't use coalesce_key per

    К-L15 + Q-N-34). Existing Publish<T>(T evt) overload preserved untouched.
  preventive_action: >
    Lesson #N7 candidate (managed API completeness verification at cascade closure):

    every native primitive с semantic parameters must have a directly-addressable

    managed API surface, не just an internal-default bridge path. Deferred к Lessons

    batch at A'.8 closure per Q-N-7X-11 split.
  effectiveness_verification:
    method: 'ManagedBusBridgeTests passes 4 new γ1 tests: distinct-keys-distinct-dispatches (100 events / 100 keys = 100 callbacks), same-key-collapses (100 events / key 7 = 1 callback), Fast tier throws, Normal tier throws.'
    date_verified: 2026-05-21
    verification_commit: c1d06f2
    verification_outcome: 12/12 ManagedBusBridgeTests PASS post-γ1 (8 pre-existing + 4 new). Managed boundary correctly forwards coalesce_key к native; tier validation catches misuse.
  lessons_learned_reference: DOC-D-A_PRIME_7_X_BUS_ARCHITECTURE_AMENDMENT
