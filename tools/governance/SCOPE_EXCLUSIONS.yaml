# tools/governance/SCOPE_EXCLUSIONS.yaml
# Paths excluded from register enrollment; not flagged as orphans by sync_register.ps1 --validate.
# This file is itself a Tier 1 LOCKED governance artifact (DOC-G-SCOPE_EXCLUSIONS).
#
# Schema version aligns with REGISTER.yaml schema_version.

schema_version: "1.0"

# Glob patterns for excluded paths
excluded_paths:
  - pattern: ".git/**"
    rationale: "Git internals"
  - pattern: "bin/**"
    rationale: "Build outputs"
  - pattern: "obj/**"
    rationale: "Build outputs"
  - pattern: "**/bin/**"
    rationale: "Build outputs (per-project)"
  - pattern: "**/obj/**"
    rationale: "Build outputs (per-project)"
  - pattern: "**/BenchmarkDotNet.Artifacts/**"
    rationale: "Auto-generated benchmark artifacts (non-canonical results; canonical reports in docs/benchmarks/)"
  - pattern: "**/LICENSE.txt"
    rationale: "Legal documents, not project documentation"
  - pattern: "**/*.csproj.lscache"
    rationale: "Lscache files"
  - pattern: "node_modules/**"
    rationale: "If npm dependencies introduced in future"
  - pattern: ".vs/**"
    rationale: "Visual Studio user-local cache"
  - pattern: "tools/DualFrontier.Analyzers/AnalyzerReleases.Shipped.md"
    rationale: "Roslyn analyzer release-tracking ceremony file (RS2000 family) — owned by the analyzer toolchain, not project documentation (CORPUS_CLOSURE_INVERSION_B CD2, ratified orphan triage: exclude)"
  - pattern: "tools/DualFrontier.Analyzers/AnalyzerReleases.Unshipped.md"
    rationale: "Roslyn analyzer release-tracking ceremony file (RS2000 family) — owned by the analyzer toolchain, not project documentation (CORPUS_CLOSURE_INVERSION_B CD2, ratified orphan triage: exclude)"
  - pattern: "docs/scratch/A_PRIME_5_CONTINUED/HALT_REPORT.md"
    rationale: "Working halt report — scratch note, non-governed (CORPUS_CLOSURE_INVERSION_B CD2, ratified orphan triage: exclude; exact-file form — docs/scratch/ also hosts governed registered reports, a folder glob would hide them)"
  - pattern: "docs/scratch/A_PRIME_5_CONTINUED/HALT_REPORT_PHASE_4.md"
    rationale: "Working halt report — scratch note, non-governed (CORPUS_CLOSURE_INVERSION_B CD2, ratified orphan triage: exclude)"
  - pattern: "docs/scratch/A_PRIME_7_K10_3/HALT_REPORT.md"
    rationale: "Working halt report — scratch note, non-governed (CORPUS_CLOSURE_INVERSION_B CD2, ratified orphan triage: exclude)"
  - pattern: "docs/scratch/A_PRIME_7_K10_3/HALT_REPORT_ADDENDUM_2026_05_19.md"
    rationale: "Working halt report addendum — scratch note, non-governed (CORPUS_CLOSURE_INVERSION_B CD2, ratified orphan triage: exclude)"
  - pattern: "docs/scratch/V0_C_2/MANUAL_VISUAL_VERIFICATION_PROTOCOL.md"
    rationale: "Manual verification protocol — scratch note, non-governed (CORPUS_CLOSURE_INVERSION_B CD2, ratified orphan triage: exclude)"
  - pattern: "docs/scratch/V1_V2/V1_MANUAL_VERIFICATION_PROTOCOL.md"
    rationale: "Manual verification protocol — scratch note, non-governed (CORPUS_CLOSURE_INVERSION_B CD2, ratified orphan triage: exclude)"
  - pattern: "docs/methodology/BRIEF_TEMPLATE.md"
    rationale: "Architect authoring scaffold (execution-brief template) — meta-tooling, non-governed (DRAFTS_RATIFICATION H3 exclusion-rider, operator-ruled 2026-07-17: exclude; exact-file form)"
  - pattern: "docs/methodology/RECON_KICKOFF_TEMPLATE.md"
    rationale: "Architect authoring scaffold (recon-kickoff template) — meta-tooling, non-governed (DRAFTS_RATIFICATION H3 exclusion-rider, operator-ruled 2026-07-17: exclude; exact-file form)"

# Allow-list inverse: only .md extensions registered.
# All other extensions excluded by default (tooling scripts like .ps1, configs like
# SCOPE_EXCLUSIONS.yaml itself are tracked through their parent module README).
included_extensions:
  - ".md"
